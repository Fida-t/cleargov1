<!DOCTYPE html>
<html>
<head>
    <title>Citizen Login - ClearGov</title>
</head>
<body style="background-color:#f0f2f5; font-family: Arial;">

<div style="
    width: 350px;
    margin: 100px auto;
    padding: 20px;
    background-color: white;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
">

    <h2 style="text-align:center;">Citizen Login</h2>

    <form method="POST">
        <input type="text" name="name" placeholder="Name" required style="width:100%; padding:10px; margin:8px 0;"><br>

        <input type="password" name="password" placeholder="Password" required style="width:100%; padding:10px; margin:8px 0;"><br>

        <button type="submit" style="
            width:100%;
            padding:10px;
            background-color:#1f3c88;
            color:white;
            border:none;
            border-radius:5px;
        ">
            Log In
        </button>
    </form>

    <hr>

    <a href="{{ url_for('citizen_register') }}">
        <button style="
            width:100%;
            padding:10px;
            background-color:#42b72a;
            color:white;
            border:none;
            border-radius:5px;
        ">
            Create New Account
        </button>
    </a>

</div>

</body>
</html>
