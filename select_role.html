<!DOCTYPE html>
<html>
<head>
    <title>Select Role</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f6f9;
        }

        .box {
            background: white;
            padding: 40px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 30px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Select Login Type</h2>

    <a href="{{ url_for('citizen_login') }}">
    <button>Login as Citizen</button>
</a>

<a href="{{ url_for('govt_login') }}">
    <button>Login as Government Official</button>
</a>
</div>

</body>
</html>
