<!DOCTYPE html>
<html>
<head>
    <title>Citizen Dashboard - ClearGov</title>
</head>

<body style="margin:0; font-family: Arial, sans-serif; background-color:#f4f6f9;">

<!-- Top Navbar -->
<div style="
    background-color:#1f3c88;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
">
    <h2>ClearGov Citizen Portal</h2>

    <div>
        Welcome, <b>{{ username }}</b>
        &nbsp;&nbsp;
        <a href="{{ url_for('home') }}" style="color:white; text-decoration:none;">
            <button style="
                padding:6px 12px;
                border:none;
                background-color:#e74c3c;
                color:white;
                border-radius:4px;
                cursor:pointer;
            ">
                Logout
            </button>
        </a>
    </div>
</div>

<!-- Main Content -->
<div style="padding:40px;">

    <h1>Dashboard</h1>
    <p>Select a service below:</p>

    <div style="display:flex; gap:20px; flex-wrap:wrap; margin-top:30px;">

        <!-- Passport -->
        <a href="{{ url_for('passport') }}" style="text-decoration:none;">
            <div style="
                width:220px;
                padding:20px;
                background-color:white;
                border-radius:8px;
                box-shadow:0 0 10px rgba(0,0,0,0.1);
                text-align:center;
            ">
                <h3>Passport Services</h3>
                <p>Apply / Track Passport</p>
            </div>
        </a>

        <!-- Voter ID -->
        <a href="{{ url_for('voters_id') }}" style="text-decoration:none;">
            <div style="
                width:220px;
                padding:20px;
                background-color:white;
                border-radius:8px;
                box-shadow:0 0 10px rgba(0,0,0,0.1);
                text-align:center;
            ">
                <h3>Voter ID Services</h3>
                <p>Apply / Update Voter ID</p>
            </div>
        </a>

        <!-- Driving License -->
        <a href="{{ url_for('drivers_license') }}" style="text-decoration:none;">
            <div style="
                width:220px;
                padding:20px;
                background-color:white;
                border-radius:8px;
                box-shadow:0 0 10px rgba(0,0,0,0.1);
                text-align:center;
            ">
                <h3>Driving License</h3>
                <p>Apply / Renew License</p>
            </div>
        </a>

        <a href="{{ url_for('ask_query') }}">
    <button>Ask a Query</button>
</a>

    </div>

</div>

</body>
</html>
