<!DOCTYPE html>
<html>
<head>
    <title>Ask a Query - ClearGov</title>
    <style>
        body { font-family: Arial; background-color: #f4f6f9; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin-bottom: 30px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, textarea, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; }
        button { background-color: green; color: white; border: none; cursor: pointer; }
        button:hover { background-color: darkgreen; }
        .query-card { background: #eef2f3; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .pending { color: orange; font-weight: bold; }
        .answered { color: green; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Ask Your Query</h2>
        <form method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <textarea name="query" placeholder="Type your query here..." rows="5" required></textarea>
    <button type="submit">Submit Query</button>
</form>
    </div>

    <h2>Your Submitted Queries</h2>

{% for q in queries %}
<div class="query-card">
    <p><b>Name:</b> {{ q.name }}</p>
    <p><b>Query:</b> {{ q.query }}</p>
    <p><b>Status:</b> 
        {% if q.status == "Pending" %}
            <span class="pending">Pending</span>
        {% else %}
            <span class="answered">Answered</span>
        {% endif %}
    </p>
    {% if q.status == "Answered" %}
    <p><b>Answer:</b> {{ q.answer }}</p>
    {% endif %}
</div>
{% endfor %}

</body>
</html>
