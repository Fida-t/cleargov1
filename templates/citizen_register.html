<!DOCTYPE html>
<html>
<head>
    <title>Register - ClearGov</title>
</head>
<body style="background-color:#f0f2f5; font-family: Arial;">

<div style="
    width: 350px;
    margin: 100px auto;
    padding: 20px;
    background-color: white;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
">

    <h2 style="text-align:center;">Create Account</h2>

    <form method="POST">
        <input type="text" name="name" placeholder="Full Name" required style="width:100%; padding:10px; margin:8px 0;"><br>

        <input type="text" name="phone" placeholder="Phone Number" required style="width:100%; padding:10px; margin:8px 0;"><br>

        <input type="password" name="password" placeholder="Set Password" required style="width:100%; padding:10px; margin:8px 0;"><br>

        <button type="submit" style="
            width:100%;
            padding:10px;
            background-color:#1f3c88;
            color:white;
            border:none;
            border-radius:5px;
        ">
            Register
        </button>
    </form>

</div>

</body>
</html>
