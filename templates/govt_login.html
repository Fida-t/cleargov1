<!DOCTYPE html>
<html>
<head>
    <title>Government Official Login</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Government Official Login</h2>

    <form method="POST" action="{{ url_for('govt_dashboard') }}">
    <input type="text" name="id" required>
    <input type="password" name="password" required>
    <button type="submit">Login</button>
</form>
</div>

</body>
</html>
