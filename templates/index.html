<!DOCTYPE html>
<html>
<head>
    <title>ClearGov</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4fbf6;
            text-align: center;
        }

        header {
            background-color: #cde8d5;
            padding: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 40px;
            color: #2f6f4e;
            letter-spacing: 2px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 60px;
        }

        .card {
            background-color: white;
            width: 220px;
            padding: 40px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background-color: #e8f5ec;
        }

        .card a {
            text-decoration: none;
            color: #2f6f4e;
            font-size: 20px;
            font-weight: bold;
        }

        footer {
            margin-top: 80px;
            padding: 15px;
            background-color: #cde8d5;
            color: #2f6f4e;
        }

    </style>
</head>

<body>

    <header>
        <h1>ClearGov</h1>
        <p>Simplifying Government Procedures</p>
    </header>

    <div class="container">

        <div class="card">
            <a href="/passport">Passport</a>
        </div>

        <div class="card">
            <a href="/drivers_license">Driving License</a>
        </div>

        <div class="card">
            <a href="/voters_id">Voter ID</a>
        </div>

    </div>

    <footer>
        © 2026 ClearGov | Beginner Hackathon Project
    </footer>

</body>
</html>
