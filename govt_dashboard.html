<!DOCTYPE html>
<html>
<head>
    <title>Government Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            margin: 0;
        }

        .header {
            background-color: #343a40;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 8px 15px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>Government Official Dashboard</h2>
</div>

<div class="container">

    <div class="card">
        <h3>View Citizen Queries</h3>
        <p>Check and respond to citizen submitted queries.</p>
        <a href="{{ url_for('admin_queries') }}">
            <button>Open Queries</button>
        </a>
    </div>

    <div class="card">
        <h3>Manage Applications</h3>
        <p>Approve or reject passport, voter ID and license applications.</p>
        <button>Manage Applications</button>
    </div>

</div>

</body>
</html>
